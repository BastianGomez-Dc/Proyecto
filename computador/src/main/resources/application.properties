spring.application.name=computador
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/componentes_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:componente_user}
spring.datasource.password=${DB_PASS:componente_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
