spring.application.name=maintenance
server.port=8084

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3310/mantencion_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:mantencion_user}
spring.datasource.password=${DB_PASS:mantencion_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
