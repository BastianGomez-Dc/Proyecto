spring.application.name=usuarios
server.port=8081

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/usuarios_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:usuario_user}
spring.datasource.password=${DB_PASS:usuario_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

computador.service.url=${COMPUTADOR_URL:http://localhost:8080}
tiposervicio.service.url=${TIPOSERVICIO_URL:http://localhost:8082}
mantencion.service.url=${MANTENCION_URL:http://localhost:8084}
